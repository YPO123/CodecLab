name: CodecLab
options:
  bundleIdPrefix: com.ypo
  deploymentTarget:
    macOS: "13.5"
  createIntermediateGroups: true
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
    ENABLE_USER_SCRIPT_SANDBOXING: false
targets:
  CodecLab:
    type: application
    platform: macOS
    deploymentTarget: "13.5"
    sources:
      - path: CodecLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ypo.CodecLab
        PRODUCT_NAME: CodecLab
        INFOPLIST_FILE: CodecLab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ""
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "13.5"
  CodecLabTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.5"
    sources:
      - path: CodecLabTests
    dependencies:
      - target: CodecLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ypo.CodecLabTests
        INFOPLIST_FILE: CodecLabTests/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "13.5"
schemes:
  CodecLab:
    build:
      targets:
        CodecLab: all
        CodecLabTests: [test]
    test:
      targets:
        - CodecLabTests
