name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: xcodebuild -scheme CodecLab -configuration Debug -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

